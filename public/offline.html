<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không có kết nối mạng - Bình Lợi Healing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style-v5.css">
    <style>
        body { background: #f8faf9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .offline-card { max-width: 400px; text-align: center; background: #fff; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="offline-card">
        <img src="/images/logo.png" alt="Bình Lợi Logo" height="60" class="mb-4">
        <h3 class="fw-bold text-dark mb-3">Bạn đang offline</h3>
        <p class="text-muted mb-4">Vui lòng kiểm tra lại kết nối Wifi hoặc mạng di động của bạn. Bình Lợi Healing sẽ tự động tải lại khi có mạng.</p>
        <button class="btn btn-danger w-100 rounded-pill py-2 fw-bold" style="background: linear-gradient(135deg, #922724 0%, #b83330 100%); border: none;" onclick="window.location.reload()">
            Thử lại
        </button>
    </div>
</body>
</html>
